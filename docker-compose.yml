x-infra-env: &infra-env
  DB_POSTGRES_HOST: postgres
  DB_POSTGRES_PORT: "5432"
  DB_POSTGRES_USER: platform
  DB_POSTGRES_PASSWORD: platform
  DB_POSTGRES_DATABASE: platform
  DB_CLICKHOUSE_HOST: clickhouse
  DB_CLICKHOUSE_PORT: "8123"
  DB_CLICKHOUSE_DATABASE: fraud_pipeline
  DB_CLICKHOUSE_USER: default
  DB_CLICKHOUSE_PASSWORD: clickhouse
  MQ_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  CACHE_REDIS_URL: redis://redis:6379/0
  FS_MINIO_ENDPOINT: minio:9000
  FS_MINIO_ACCESS_KEY: minioadmin
  FS_MINIO_SECRET_KEY: minioadmin
  FS_MINIO_BUCKET: de-platform
  FS_MINIO_SECURE: "false"
  JWT_SECRET: "docker-compose-jwt-secret-at-least-32-bytes!!"

x-app-common: &app-common
  build: .
  image: de-platform:latest
  restart: unless-stopped
  depends_on:
    migrations:
      condition: service_completed_successfully
  environment:
    <<: *infra-env
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "0.5"
      reservations:
        memory: 128M
        cpus: "0.1"

services:
  # ── Infrastructure ───────────────────────────────────────────────────

  postgres:
    image: postgres:16
    profiles: [infra, full]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    command: postgres -c max_connections=500
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [infra, full]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: [infra, full]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [infra, full]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    profiles: [infra, full]
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_DB: fraud_pipeline
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhousedata:/var/lib/clickhouse
      - ./scripts/clickhouse_init.sql:/docker-entrypoint-initdb.d/clickhouse_init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password clickhouse -q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    profiles: [infra, full]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    profiles: [infra, full]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    profiles: [infra, full]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:latest
    profiles: [infra, full]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  # ── Migrations ───────────────────────────────────────────────────────

  migrations:
    <<: *app-common
    profiles: [app, full]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        python -m de_platform migrate up warehouse --db postgres &&
        python -m de_platform migrate up alerts --db postgres &&
        python -m de_platform migrate up client_config --db postgres &&
        python -m de_platform migrate up auth --db postgres &&
        python -m de_platform migrate up alert_manager --db postgres &&
        python -m de_platform migrate up data_audit --db postgres &&
        python -m de_platform migrate up task_scheduler --db postgres
      "

  # ── Application Modules ─────────────────────────────────────────────

  rest-starter:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8001:8001"
    command: >
      run rest_starter --mq kafka --port 8001 --health-port 9100 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  normalizer:
    <<: *app-common
    profiles: [app, full]
    command: >
      run normalizer --db warehouse=postgres --cache redis --mq kafka --health-port 9101 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9101/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  persistence:
    <<: *app-common
    profiles: [app, full]
    stop_grace_period: 30s
    command: >
      run persistence --db clickhouse=clickhouse --fs minio --mq kafka --health-port 9102 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9102/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  algos:
    <<: *app-common
    profiles: [app, full]
    command: >
      run algos --cache redis --mq kafka --health-port 9103 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9103/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  alert-manager:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8007:8007"
    command: >
      run alert_manager --db alerts=postgres --mq kafka --cache redis --port 8007 --health-port 9104 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9104/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  data-api:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8002:8002"
    command: >
      run data_api --db events=clickhouse --port 8002 --health-port 9105 --log pretty
    environment:
      <<: *infra-env
      ALERT_MANAGER_URL: "http://alert-manager:8007"
      CLIENT_CONFIG_URL: "http://client-config:8003"
      DATA_AUDIT_URL: "http://data-audit:8005"
      TASK_SCHEDULER_URL: "http://task-scheduler:8006"
      AUTH_URL: "http://auth:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9105/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client-config:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8003:8003"
    command: >
      run client_config --db client_config=postgres --cache redis --port 8003 --health-port 9106 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9106/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8004:8004"
    command: >
      run auth --db auth=postgres --port 8004 --health-port 9107 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9107/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  data-audit:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8005:8005"
    command: >
      run data_audit --db data_audit=postgres --mq kafka --port 8005 --health-port 9108 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9108/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  task-scheduler:
    <<: *app-common
    profiles: [app, full]
    ports:
      - "8006:8006"
    command: >
      run task_scheduler --db task_scheduler=postgres --port 8006 --health-port 9109 --log pretty
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9109/health/startup')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  clickhousedata:
  miniodata:
  prometheusdata:
  grafanadata:
