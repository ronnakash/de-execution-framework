apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-audit
  namespace: de-platform
  labels:
    app: data-audit
    app.kubernetes.io/part-of: de-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-audit
  template:
    metadata:
      labels:
        app: data-audit
    spec:
      containers:
        - name: data-audit
          image: de-platform:latest
          command: ["python", "-m", "de_platform", "run", "data_audit",
                    "--db", "data_audit=postgres", "--mq", "kafka",
                    "--port", "8005", "--health-port", "9108", "--log", "pretty"]
          ports:
            - containerPort: 8005
              name: http
            - containerPort: 9108
              name: health
          envFrom:
            - configMapRef:
                name: de-platform-config
            - secretRef:
                name: de-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health/startup
              port: 9108
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-audit
  namespace: de-platform
spec:
  selector:
    app: data-audit
  ports:
    - name: http
      port: 8005
      targetPort: 8005
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-audit-hpa
  namespace: de-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-audit
  minReplicas: 1
  maxReplicas: 3  # matches audit topic partition count
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
