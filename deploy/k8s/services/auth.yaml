apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: de-platform
  labels:
    app: auth
    app.kubernetes.io/part-of: de-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: de-platform:latest
          command: ["python", "-m", "de_platform", "run", "auth",
                    "--db", "auth=postgres", "--port", "8004",
                    "--health-port", "9107", "--log", "pretty"]
          ports:
            - containerPort: 8004
              name: http
            - containerPort: 9107
              name: health
          envFrom:
            - configMapRef:
                name: de-platform-config
            - secretRef:
                name: de-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health/startup
              port: 9107
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: de-platform
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 8004
      targetPort: 8004
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-hpa
  namespace: de-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
