apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api
  namespace: de-platform
  labels:
    app: data-api
    app.kubernetes.io/part-of: de-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-api
  template:
    metadata:
      labels:
        app: data-api
    spec:
      containers:
        - name: data-api
          image: de-platform:latest
          command: ["python", "-m", "de_platform", "run", "data_api",
                    "--db", "events=clickhouse", "--port", "8002",
                    "--health-port", "9105", "--log", "pretty"]
          ports:
            - containerPort: 8002
              name: http
            - containerPort: 9105
              name: health
          env:
            - name: ALERT_MANAGER_URL
              value: "http://alert-manager:8007"
            - name: CLIENT_CONFIG_URL
              value: "http://client-config:8003"
            - name: DATA_AUDIT_URL
              value: "http://data-audit:8005"
            - name: TASK_SCHEDULER_URL
              value: "http://task-scheduler:8006"
            - name: AUTH_URL
              value: "http://auth:8004"
          envFrom:
            - configMapRef:
                name: de-platform-config
            - secretRef:
                name: de-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/startup
              port: 9105
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-api
  namespace: de-platform
spec:
  type: LoadBalancer
  selector:
    app: data-api
  ports:
    - name: http
      port: 8002
      targetPort: 8002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-api-hpa
  namespace: de-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-api
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
