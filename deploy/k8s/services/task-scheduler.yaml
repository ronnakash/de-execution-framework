apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-scheduler
  namespace: de-platform
  labels:
    app: task-scheduler
    app.kubernetes.io/part-of: de-platform
spec:
  # Singleton — APScheduler needs single leader to avoid duplicate job execution.
  # For multi-instance, use leader election or an external scheduler.
  replicas: 1
  selector:
    matchLabels:
      app: task-scheduler
  template:
    metadata:
      labels:
        app: task-scheduler
    spec:
      containers:
        - name: task-scheduler
          image: de-platform:latest
          command: ["python", "-m", "de_platform", "run", "task_scheduler",
                    "--db", "task_scheduler=postgres", "--port", "8006",
                    "--health-port", "9109", "--log", "pretty"]
          ports:
            - containerPort: 8006
              name: http
            - containerPort: 9109
              name: health
          envFrom:
            - configMapRef:
                name: de-platform-config
            - secretRef:
                name: de-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health/startup
              port: 9109
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler
  namespace: de-platform
spec:
  selector:
    app: task-scheduler
  ports:
    - name: http
      port: 8006
      targetPort: 8006
