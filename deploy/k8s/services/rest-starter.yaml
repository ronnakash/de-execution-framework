apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-starter
  namespace: de-platform
  labels:
    app: rest-starter
    app.kubernetes.io/part-of: de-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rest-starter
  template:
    metadata:
      labels:
        app: rest-starter
    spec:
      containers:
        - name: rest-starter
          image: de-platform:latest
          command: ["python", "-m", "de_platform", "run", "rest_starter",
                    "--mq", "kafka", "--port", "8001",
                    "--health-port", "9100", "--log", "pretty"]
          ports:
            - containerPort: 8001
              name: http
            - containerPort: 9100
              name: health
          envFrom:
            - configMapRef:
                name: de-platform-config
            - secretRef:
                name: de-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/startup
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rest-starter
  namespace: de-platform
spec:
  selector:
    app: rest-starter
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rest-starter-hpa
  namespace: de-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rest-starter
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
